name: Build LoudMic

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-loudmic.yml"
      - "plugins/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - "settings.gradle.kts"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build LoudMic.zip
        run: gradle :plugins:LoudMic:copyZipToRepoRoot

      - name: Upload LoudMic.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoudMic-zip
          path: LoudMic.zip
          if-no-files-found: error

  publish-builds-branch:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download LoudMic.zip artifact
        uses: actions/download-artifact@v4
        with:
          name: LoudMic-zip
          path: dist

      - name: Publish LoudMic.zip to builds branch
        run: |
          set -euxo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin builds; then
            git fetch origin builds:builds
            git checkout builds
          else
            git checkout --orphan builds
          fi

          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp dist/LoudMic.zip ./LoudMic.zip

          git add LoudMic.zip
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "Publish LoudMic.zip from GitHub Actions"
          git push origin builds --force
